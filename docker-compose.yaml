version: '3.8'

services:
  db:
    build: .
    container_name: zlaplokal_db
    platform: linux/amd64
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./backups:/var/opt/mssql/backups
      - ./restore.sh:/restore.sh

volumes:
  sqlserver_data:
